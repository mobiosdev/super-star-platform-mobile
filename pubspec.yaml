name: super_star_platform
description: SuperStar App - Creator-fan subscription platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.4.3+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  equatable: ^2.0.5
  web_socket_channel: ^3.0.0
  # Add flutter_stripe when implementing payments (requires Kotlin 2.1+ / AGP 8.5+)
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
